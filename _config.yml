title: Knowledge Docs
description: AI, Agentic AI & Enterprise Architecture Knowledge Base
theme: just-the-docs

url: "https://sreeshnair84.github.io"
baseurl: "/knowledge-docs"

# Search
search_enabled: true
search:
  heading_level: 2
  previews: 3

# Navigation
nav_enabled: true
nav_sort: case_insensitive

# Footer
footer_content: "Knowledge Docs &mdash; AI & Enterprise Architecture"

# Permalink style
permalink: pretty

# Aux links in header
aux_links:
  "GitHub":
    - "https://github.com/sreeshnair84/knowledge-docs"
aux_links_new_tab: true

# Color scheme
color_scheme: light

# Only exclude build files — serve all content files (PDFs, HTML, JSX, DOCX etc.)
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor

plugins:
  - jekyll-seo-tag
