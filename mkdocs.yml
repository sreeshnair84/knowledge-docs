site_name: Knowledge Docs
site_description: AI, Agentic AI & Enterprise Architecture Knowledge Base
site_url: https://sreeshnair84.github.io/knowledge-docs/
repo_url: https://github.com/sreeshnair84/knowledge-docs
repo_name: sreeshnair84/knowledge-docs
edit_uri: edit/main/docs/
docs_dir: docs
site_dir: site

theme:
  name: material
  custom_dir: overrides
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.indexes
    - navigation.instant
    - navigation.instant.progress
    - navigation.top
    - navigation.path
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.focus
    - search.share
    - content.code.copy
    - content.code.select
    - content.action.edit
    - content.action.view
    - content.tooltips
    - announce.dismiss
    - header.autohide

plugins:
  - search:
      lang: en
  - git-revision-date-localized:
      enable_creation_date: true
      type: date
      fallback_to_build_date: true
  - glightbox:
      touchNavigation: true
      effect: zoom
      zoomable: true
      draggable: true
      width: 100%
      height: auto
  - minify:
      minify_html: true
      minify_js: true
      minify_css: true
      htmlmin_opts:
        remove_comments: true
  - tags

hooks:
  - hooks/docs_gen.py

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/pdf-viewer.js

not_in_nav: |
  **/*.html
  **/*.pdf
  **/*.docx
  **/*.pptx
  **/*.xlsx
  **/*.jsx
  **/*.excalidraw
  **/*.txt

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/sreeshnair84/knowledge-docs

