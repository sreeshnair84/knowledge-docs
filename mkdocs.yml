site_name: Knowledge Docs
site_description: AI, Agentic AI & Enterprise Architecture Knowledge Base
site_url: https://sreeshnair84.github.io/knowledge-docs/
repo_url: https://github.com/sreeshnair84/knowledge-docs
repo_name: sreeshnair84/knowledge-docs
docs_dir: docs
site_dir: site

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - navigation.indexes
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - toc.follow
    - toc.integrate

plugins:
  - search:
      lang: en

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/pdf-viewer.js

not_in_nav: |
  **/*.html
  **/*.pdf
  **/*.docx
  **/*.pptx
  **/*.xlsx
  **/*.jsx
  **/*.excalidraw
  **/*.txt

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/sreeshnair84/knowledge-docs

