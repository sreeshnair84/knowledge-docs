name: knowledge-repo-checks

# Backstop for the local pre-commit hook — catches anything pushed with
# --no-verify, from a clone without the hook installed, or via the GitHub
# web editor. Runs the same two checks: structure/frontmatter lint, and a
# near-duplicate check on newly added pages.

on:
  pull_request:
    paths:
      - 'docs/**/*.md'

jobs:
  check-changed-pages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need full history to diff against the base branch

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install --break-system-packages pyyaml scikit-learn

      - name: Get changed markdown files
        id: changed
        run: |
          git fetch origin "${{ github.event.pull_request.base.ref }}" --depth=1
          CHANGED=$(git diff --name-only --diff-filter=ACM \
            "origin/${{ github.event.pull_request.base.ref }}"...HEAD -- 'docs/**/*.md')
          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGED" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Lint changed pages
        if: steps.changed.outputs.files != ''
        run: |
          FAIL=0
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            [ -f "$file" ] || continue
            echo "--- $file ---"
            if ! python3 .claude/skills/knowledge-page-authoring/scripts/lint_page.py "$file"; then
              FAIL=1
            fi
          done <<< "${{ steps.changed.outputs.files }}"
          exit $FAIL

      - name: Duplicate check on newly added pages
        if: steps.changed.outputs.files != ''
        run: |
          FAIL=0
          git fetch origin "${{ github.event.pull_request.base.ref }}" --depth=1
          ADDED=$(git diff --name-only --diff-filter=A \
            "origin/${{ github.event.pull_request.base.ref }}"...HEAD -- 'docs/**/*.md')
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            [ -f "$file" ] || continue
            echo "--- $file ---"
            OUT=$(python3 .claude/skills/knowledge-page-authoring/scripts/check_against_corpus.py "$file" --threshold 0.85 2>&1)
            echo "$OUT"
            if echo "$OUT" | grep -q "NEAR-DUPLICATE"; then
              FAIL=1
            fi
          done <<< "$ADDED"
          exit $FAIL

      - name: No changed pages
        if: steps.changed.outputs.files == ''
        run: echo "No docs/**/*.md files changed in this PR."
